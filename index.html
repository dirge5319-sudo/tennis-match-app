    function renderMembers(data) {
      if (!data || !data.ok) { showError(data && data.error || 'データ取得失敗'); return; }
      currentMembersData = data;
      document.getElementById('main').removeAttribute('aria-busy');

      var teamABtn = '<button class="tab-btn ' + (currentTeamSide === 'A' ? 'active' : '') + '" onclick="switchTeam(\'A\')">' + escapeHtml(data.teamAName) + ' (' + data.teamA.length + ')</button>';
      var teamBBtn = '<button class="tab-btn ' + (currentTeamSide === 'B' ? 'active' : '') + '" onclick="switchTeam(\'B\')">' + escapeHtml(data.teamBName) + ' (' + data.teamB.length + ')</button>';

      // spec/feature-member-mix-preference-2026-05-22.md §5-1-2:
      //   各メンバー行にミックス希望 <select> を追加（4択: 指定なし/多め/少なめ/なし）
      //   保存は既存の collectCurrentMembers → 保存ボタン経由でまとめて行う
      var members = currentTeamSide === 'A' ? data.teamA : data.teamB;
      var memberRows = members.map(function (m, idx) {
        var mp = m.mixedPreference;
        // option の selected 判定（null は value="" に対応）
        var opt = function (val, label) {
          var selected = (val === '' ? mp == null : mp === val);
          return '<option value="' + val + '"' + (selected ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
        };
        // pm-S10 (2026-05-24 オーナー要求): 各行に予定試合数 placeholder を仕込む
        //   - data-mname に元の名前を埋めておき、updateMembersPlannedCounts で集計値を流し込む
        //   - 名前変更中（未保存）の場合は旧名で集計するため値は古いが、保存後の再描画で更新される
        // pm-S10 fix (2026-05-24 FE BLOCKER-1):
        //   role="status" + aria-live="polite" + aria-atomic="true" を付与し
        //   集計値更新時に支援技術へ通知が届くようにする。
        //   role/aria-* は div 要素そのものの属性なので innerHTML 上書きでも維持される。
        return '<div class="member-row" data-idx="' + idx + '">' +
          '<input type="text" class="member-name" value="' + escapeHtml(m.name) + '" placeholder="名前">' +
          '<input type="number" inputmode="numeric" pattern="[0-9]*" min="1" max="10" class="member-level" value="' + (m.level != null ? m.level : '') + '" placeholder="Lv">' +
          // 2026-05-26 オーナー要求: 新規追加メンバーの gender 初期値を空にして保存前に検知できるようにする
          //   既存メンバー (gender='男'|'女') はそのまま selected が当たる。
          //   addMember() で空文字 '' を生成 → どの option も selected にならず「未選択」が表示される。
          '<select class="member-gender">' +
            '<option value=""' + (m.gender !== '男' && m.gender !== '女' ? ' selected' : '') + '>未選択</option>' +
            '<option value="男"' + (m.gender === '男' ? ' selected' : '') + '>男</option>' +
            '<option value="女"' + (m.gender === '女' ? ' selected' : '') + '>女</option>' +
          '</select>' +
          '<select class="member-mix-preference" aria-label="ミックス希望">' +
            opt('',     '指定なし') +
            opt('more', 'ミックス多め') +
            opt('less', 'ミックス少なめ') +
            opt('none', 'ミックスなし') +
          '</select>' +
          '<div class="member-stats">' + (m.win || 0) + '勝/' + (m.loss || 0) + '負</div>' +
          '<button class="btn-delete" onclick="deleteMember(' + idx + ')" aria-label="削除">×</button>' +
          '<div class="member-planned" data-mname="' + escapeHtml(m.name) + '"' +
               ' role="status" aria-live="polite" aria-atomic="true">' +
            '<span class="mp-label">予定:</span>' +
            '<span class="mp-empty">計算中...</span>' +
          '</div>' +
        '</div>';
      }).join('');

      // ミックス希望ヒント（メンバーリスト下部）
      //   spec/feature-member-mix-preference-2026-05-22.md §5-1-4
      var mpHint =
        '<div class="hint" id="mp-hint" style="margin-top:8px;margin-bottom:12px;color:#6e6e73;font-size:12px;">' +
          '「ミックスなし」を選んだメンバーはミックス試合に出ません。' +
          '「多め」「少なめ」は希望度合いの指定です。' +
        '</div>';

      // gp-S9 fix v3 (2026-05-24 オーナー実機「予定試合数でていない」対応):
      //   オーナー要求原文「予定試合数も生成時にメンバーの横にカテゴリーごとに記載」を
      //   文字通り解釈し、メンバー画面にもプレビューを表示。
      //   生成画面の #gen-preview と同じ DOM 構造を別 ID 接尾辞 -m で複製。
      //   更新は updateMembersPreview() で行う（updateGeneratePreview と同等ロジック）。
      var membersPreview =
        '<section class="generate-section" id="gen-preview-m" aria-live="polite" aria-atomic="true" style="margin-top:12px;">' +
          '<h2>予定試合数<span class="gp-rounds-label">（保存後の設定で計算 / <span id="gp-rounds-m">-</span> ラウンド合計）</span></h2>' +
          '<div id="gp-empty-msg-m" class="hint" style="display:none;">' +
            'メンバーを追加すると予定試合数が表示されます' +
          '</div>' +
          '<div id="gp-numbers-m">' +
            '<div class="gp-row">' +
              '<span id="gp-md-m">男ダブ -試合</span>' +
              '<span aria-hidden="true">/</span>' +
              '<span id="gp-fd-m">女ダブ -試合</span>' +
              '<span aria-hidden="true">/</span>' +
              '<span id="gp-mix-m">ミックス -試合</span>' +
            '</div>' +
            '<div class="gp-total-wrap">' +
              '合計 <span id="gp-total-m">-</span> 試合' +
            '</div>' +
          '</div>' +
        '</section>';

      document.getElementById('main').innerHTML =
        '<div class="tab-bar">' + teamABtn + teamBBtn + '</div>' +
        '<div class="member-list">' + memberRows + '</div>' +
        '<button class="btn-add" onclick="addMember()">＋ メンバーを追加</button>' +
        mpHint +
        membersPreview +
        '<button class="footer-btn footer-btn-fixed" id="btn-save-members" onclick="saveMembers()">保存</button>';
      // メンバー画面のプレビュー初期描画（保存済データから計算）
      updateMembersPreview();
      // pm-S10 (2026-05-24): 各メンバー行に予定試合数を流し込む（非同期で集計）
      updateMembersPlannedCounts();
    }

    // pm-S10 (2026-05-24 オーナー要求「誰が何試合するか結果いれなくても分かる」):
    //   生成済 rounds (未確定スコア含む) から各メンバーのカテゴリ別試合数を集計。
    //   - 戻り値: { memberName: { MD: n, FD: n, Mix: n, MS: n, WS: n, total: n } }
    //   - 名前が空欄 / undefined / "" のマッチスロットは無視
    //   - 試合データは court > 0 のものだけカウント（空テンプレ行は除外）
    async function computePlannedMatchesPerMember() {
      var rounds = await window.store.getAll('rounds');
      var counts = {};
      var typeKey = function (t) {
        var s = String(t || '');
        if (s === 'ミックスダブルス') return 'Mix';
        if (s === '女子ダブルス')     return 'FD';
        if (s === '男子ダブルス')     return 'MD';
        if (s === '男子シングルス')   return 'MS';
        if (s === '女子シングルス')   return 'WS';
        return 'other';
      };
      (rounds || []).forEach(function (r) {
        (r.matches || []).forEach(function (m) {
          if (!m || typeof m.court !== 'number' || m.court <= 0) return;
          var key = typeKey(m.type);
          ['a1', 'a2', 'b1', 'b2'].forEach(function (slot) {
            var name = m[slot];
            if (!name || name === '') return;
            if (!counts[name]) counts[name] = { MD: 0, FD: 0, Mix: 0, MS: 0, WS: 0, total: 0 };
            if (counts[name][key] == null) counts[name][key] = 0;
            counts[name][key]++;
            counts[name].total++;
          });
        });
      });
      return counts;
    }

    // pm-S10 (2026-05-24): 各メンバー行の .member-planned に集計値を流し込む
    //   - DOM 走査は member-row[data-idx] ベース。data-mname に元の名前が入っているのを使う
    //   - 名前変更中（未保存）の行は旧名で集計したものを表示するため値が古い可能性がある
    //     → 保存後 saveMembers から renderMembers が再描画されるとき updateMembersPlannedCounts も走るので更新される
    //   - 0 試合のメンバーは「予定: なし」表記
    async function updateMembersPlannedCounts() {
      var rows = document.querySelectorAll('.member-row .member-planned');
      if (rows.length === 0) return;
      var counts;
      try {
        counts = await computePlannedMatchesPerMember();
      } catch (err) {
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('updateMembersPlannedCounts failed:', err && err.message);
        }
        return;
      }
      rows.forEach(function (el) {
        var name = el.getAttribute('data-mname') || '';
        var c = counts[name] || { MD: 0, FD: 0, Mix: 0, MS: 0, WS: 0, total: 0 };
        if (c.total === 0) {
          el.innerHTML = '<span class="mp-label">予定:</span><span class="mp-empty">なし</span>';
          return;
        }
        var parts = [];
        if (c.MD  > 0) parts.push('<span class="mp-cat">男ダブ '   + c.MD  + '試合</span>');
        if (c.FD  > 0) parts.push('<span class="mp-cat">女ダブ '   + c.FD  + '試合</span>');
        if (c.Mix > 0) parts.push('<span class="mp-cat">ミックス ' + c.Mix + '試合</span>');
        if (c.MS  > 0) parts.push('<span class="mp-cat">男シン '   + c.MS  + '試合</span>');
        if (c.WS  > 0) parts.push('<span class="mp-cat">女シン '   + c.WS  + '試合</span>');
        el.innerHTML =
          '<span class="mp-label">予定:</span>' +
          parts.join('<span aria-hidden="true">/</span>') +
          '<span class="mp-total">合計 ' + c.total + '試合</span>';
      });
      if (typeof console !== 'undefined' && console.info) {
        console.info('[member-planned] ' + rows.length + ' 行更新 / 集計対象メンバー ' + Object.keys(counts).length + ' 名');
      }
    }

    // gp-S9 fix v3 (2026-05-24): メンバー画面側のプレビュー更新
    //   updateGeneratePreview と同等ロジックだが ID 接尾辞 -m を使う。
    //   メンバー画面では gen-count input がないため、cfg.plannedRounds を N として使う。
    //   未保存の編集中メンバーは反映しない（保存後の値で計算する旨をラベルで明示）。
    async function updateMembersPreview() {
      var elRounds = document.getElementById('gp-rounds-m');
      var elMD     = document.getElementById('gp-md-m');
      var elFD     = document.getElementById('gp-fd-m');
      var elMix    = document.getElementById('gp-mix-m');
      var elTotal  = document.getElementById('gp-total-m');
      var elEmpty   = document.getElementById('gp-empty-msg-m');
      var elNumbers = document.getElementById('gp-numbers-m');
      if (!elRounds || !elMD || !elFD || !elMix || !elTotal) return;
      try {
        var cfg = await dbGetConfig();
        var n = 1;
        if (cfg && cfg.plannedRounds != null) {
          var nNum = Number(cfg.plannedRounds);
          if (isFinite(nNum) && nNum >= 1) n = Math.min(50, Math.floor(nNum));
        }
        var all = await window.store.getAll('members');
        var normPref = function (mp) {
          return (mp === 'more' || mp === 'less' || mp === 'none') ? mp : null;
        };
        var teamA = all.filter(function (m) { return m && m.team === 'A'; }).map(function (m) {
          return { name: m.name, level: m.level || 0,
                   // 2026-05-26: 性別バグ真因対策 — 未選択は '' のまま渡し、parseGender_ で null 化される
                   gender: (m.gender === '女' || m.gender === '男') ? m.gender : '',
                   mixedPreference: normPref(m.mixedPreference) };
        });
        var teamB = all.filter(function (m) { return m && m.team === 'B'; }).map(function (m) {
          return { name: m.name, level: m.level || 0,
                   // 2026-05-26: 性別バグ真因対策 — 未選択は '' のまま渡し、parseGender_ で null 化される
                   gender: (m.gender === '女' || m.gender === '男') ? m.gender : '',
                   mixedPreference: normPref(m.mixedPreference) };
        });
        if (teamA.length === 0 && teamB.length === 0) {
          elRounds.textContent = String(n);
          if (elEmpty)   elEmpty.style.display = 'block';
          if (elNumbers) elNumbers.style.display = 'none';
          return;
        }
        if (elEmpty)   elEmpty.style.display = 'none';
        if (elNumbers) elNumbers.style.display = '';
        // 2026-05-26: プレビューも penaltyWeights 反映（実生成と完全一致させる）
        var ctx = { courts: cfg.courtCount, teamA: teamA, teamB: teamB,
                    categories: cfg.categories, history: [],
                    penaltyWeights: cfg.penaltyWeights || undefined };
        // gp-S9 fix v4 (2026-05-24 reviewer 不均衡構成 UI vs 実生成乖離対応):
        //   updateGeneratePreview と同じ分岐モデルでメンバー画面プレビューも計算する。
        //   詳細は updateGeneratePreview のコメント参照。
        var hasMixedCountValue = (cfg.mixedCount != null && cfg.mixedCount !== ''
                                  && !isNaN(Number(cfg.mixedCount)));
        var a = 0, b = 0, c = 0;
        if (hasMixedCountValue) {
          var M = Number(cfg.mixedCount);
          var maxTotal = await calculateMaxPossibleMix(n);
          if (M > maxTotal) M = maxTotal;
          var distribution = planMixDistribution(M, n);
          for (var i = 0; i < n; i++) {
            var p1R = window.TennisCore.planOptimalConfiguration_(1, ctx, { fixedMix: distribution[i] });
            if (p1R) {
              a += (isFinite(p1R.a) ? p1R.a : 0);
              b += (isFinite(p1R.b) ? p1R.b : 0);
              c += (isFinite(p1R.c) ? p1R.c : 0);
            }
          }
        } else {
          // auto モード: N 全体プランを 1 回呼ぶ (generateOne の slotPlan パスと同一)
          var planN = window.TennisCore.planOptimalConfiguration_(n, ctx, {});
          if (planN) {
            a = isFinite(planN.a) ? planN.a : 0;
            b = isFinite(planN.b) ? planN.b : 0;
            c = isFinite(planN.c) ? planN.c : 0;
          }
        }
        elRounds.textContent = String(n);
        elMD.textContent  = '男ダブ '   + a + '試合';
        elFD.textContent  = '女ダブ '   + b + '試合';
        elMix.textContent = 'ミックス ' + c + '試合';
        elTotal.textContent = String(a + b + c);
        if (typeof console !== 'undefined' && console.info) {
          console.info('[gp-preview-m] N=' + n + ' / A=' + teamA.length + ' B=' + teamB.length
                       + ' / MD=' + a + ' FD=' + b + ' Mix=' + c + ' / 合計=' + (a + b + c));
        }
      } catch (err) {
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('updateMembersPreview failed:', err && err.message);
        }
        elMD.textContent  = '男ダブ -試合';
        elFD.textContent  = '女ダブ -試合';
        elMix.textContent = 'ミックス -試合';
        elTotal.textContent = '-';
      }
    }

    function switchTeam(side) {
      collectCurrentMembers();
      currentTeamSide = side;
      renderMembers(currentMembersData);
    }

    function collectCurrentMembers() {
      if (!currentMembersData) return;
      var rows = document.querySelectorAll('.member-row');
      var members = [];
      rows.forEach(function (row) {
        var name = row.querySelector('.member-name').value.trim();
        var levelStr = row.querySelector('.member-level').value;
        var gender = row.querySelector('.member-gender').value;
        // spec/feature-member-mix-preference-2026-05-22.md §5-1-2:
        //   ミックス希望 select の現在値を取得。空文字 → null として保存
        var mpEl = row.querySelector('.member-mix-preference');
        var mpRaw = mpEl ? mpEl.value : '';
        var mp = (mpRaw === 'more' || mpRaw === 'less' || mpRaw === 'none') ? mpRaw : null;
        if (name === '') return;
        members.push({
          name: name,
          level: levelStr === '' ? null : Number(levelStr),
          gender: gender,
          mixedPreference: mp,
        });
      });
      if (currentTeamSide === 'A') currentMembersData.teamA = members;
      else currentMembersData.teamB = members;
    }

    function addMember() {
      collectCurrentMembers();
      // mixedPreference 初期値は null（=指定なし）。spec §4-1 デフォルト
      // 2026-05-26 オーナー要求: gender 初期値は '' (未選択) に変更。
      //   従来は '男' 固定 → 性別未確認のまま保存される事故が起きていたため、
      //   保存前バリデーション (saveMembers) で空チェックして気づけるようにする。
      var newMember = { name: '', level: 5, gender: '', played: 0, win: 0, loss: 0, mixedPreference: null };
      if (currentTeamSide === 'A') currentMembersData.teamA.push(newMember);
      else currentMembersData.teamB.push(newMember);
      renderMembers(currentMembersData);
    }

    function deleteMember(idx) {
      collectCurrentMembers();
      var list = currentTeamSide === 'A' ? currentMembersData.teamA : currentMembersData.teamB;
      var target = list[idx];
      if (!confirm('⚠ ' + (target.name || '空欄') + ' を削除します。\n\n履歴の試合データは残ります。\n\n本当に削除しますか？')) return;
      list.splice(idx, 1);
      renderMembers(currentMembersData);
    }

    // チームA → チームB の順で保存
    // 2026-05-26 オーナー要求 (gender-default-empty スプリント):
    //   性別が未選択 (gender === '') のメンバーがいたら保存前にアラートで対象名を列挙し、
    //   オーナー判断で「強制保存」か「中止」を選べるようにする。
    //   既存データ ('男' / '女') への影響なし。
    //
    // 2026-05-26 オーナー要求 (duplicate-name-block 案A):
    //   内部の試合管理は name 文字列をキーに使うため、同名2人がいると
    //   「片方の試合カウントしか進まない / 性別が混線する」などの致命バグが起きる。
    //   そのため保存前に両チーム横断で name の重複を検知し、重複があれば
    //   alert で対象名を列挙 → 保存を中止する。
    //   既存データ (旧データで同名が既に存在) は読み込みのみ動き続け、
    //   新規保存 (saveMembers) を通そうとした時にのみ拒否される。
    async function saveMembers() {
      collectCurrentMembers();
      var btn = document.getElementById('btn-save-members');
      var teamACopy = JSON.parse(JSON.stringify(currentMembersData.teamA));
      var teamBCopy = JSON.parse(JSON.stringify(currentMembersData.teamB));

      // ─── 同名メンバー検知（保存前・両チーム横断）──────────────────
      //   仕様: 大文字小文字は区別する（テニスメンバー名は日本語想定なので影響軽微）
      //         前後空白だけは除去（"田中 " と "田中" は同一扱い）
      //         空欄行は collectCurrentMembers でスキップ済みだが、念のため再チェック
      var nameSeen = {};
      var dupNames = [];
      function checkDup(m) {
        if (!m || !m.name) return;
        var key = String(m.name).trim();
        if (key === '') return;
        if (nameSeen[key]) {
          // 重複回数を稼がずに 1回だけ収集
          if (dupNames.indexOf(key) === -1) dupNames.push(key);
        } else {
          nameSeen[key] = true;
        }
      }
      teamACopy.forEach(checkDup);
      teamBCopy.forEach(checkDup);

      if (dupNames.length > 0) {
        alert(
          '同じ名前のメンバーがいます: ' + dupNames.join(', ') + '\n\n' +
          '内部の試合管理が混乱するため、識別できる名前にしてください。\n' +
          '例: 「田中A」「田中B」「田中 太郎」「田中 (チームA)」など'
        );
        return; // 保存中止
      }

      // ─── 性別未選択チェック（保存前）────────────────────────
      //   teamA/teamB 横断で gender が '男' / '女' 以外（'' / null / undefined）のメンバー名を集める
      var unsetNames = [];
      teamACopy.forEach(function (m) {
        if (m.gender !== '男' && m.gender !== '女') {
          unsetNames.push((currentMembersData.teamAName || 'A') + ': ' + (m.name || '空欄'));
        }
      });
      teamBCopy.forEach(function (m) {
        if (m.gender !== '男' && m.gender !== '女') {
          unsetNames.push((currentMembersData.teamBName || 'B') + ': ' + (m.name || '空欄'));
        }
      });
      if (unsetNames.length > 0) {
        var msg = '性別が未選択のメンバーがいます:\n\n' +
                  unsetNames.join('\n') +
                  '\n\nOK: そのまま強制保存 / キャンセル: 保存中止して修正に戻る';
        if (!confirm(msg)) {
          // オーナー判断: 保存中止
          return;
        }
        // 強制保存続行（オーナー承知の上）
      }

      btn.disabled = true; btn.textContent = '保存中...';
      try {
        await dbSaveMembers('A', teamACopy);
        await dbSaveMembers('B', teamBCopy);
        alert('保存しました（A: ' + teamACopy.length + '名 / B: ' + teamBCopy.length + '名）');
        btn.disabled = false; btn.textContent = '保存';
      } catch (err) {
        btn.disabled = false; btn.textContent = '保存';
        showError('保存失敗: ' + ((err && err.message) || String(err)));
      }
    }

    // ─── 画面5: 設定 ───────────────────────────────────────
    var currentConfig = null;

    async function loadConfig() {
      document.getElementById('page-title').textContent = '設定';
      var main = document.getElementById('main');
      main.setAttribute('aria-busy', 'true');
      main.innerHTML =
        '<div class="config-section">' +
          '<div class="skeleton skeleton-line mid" style="height:18px;margin-bottom:12px;"></div>' +
          '<div class="skeleton skeleton-line long" style="height:44px;margin-bottom:8px;border-radius:8px;"></div>' +
        '</div>';
      try {
        var data = await dbGetConfig();
        // spec/feature-member-mix-preference-2026-05-22.md §5-2:
        //   個別希望に non-null が1人でもいるかを判定して、mixedCount の disabled 制御に使う
        var allMembers = await window.store.getAll('members');
        var hasIndivPreference = allMembers.some(function (m) {
          var mp = m && m.mixedPreference;
          return mp === 'more' || mp === 'less' || mp === 'none';
        });
        data.hasIndivPreference = hasIndivPreference;
        // spec/feature-mixedcount-ui-2026-05-23 §2:
        //   推奨値計算のために男女別人数を取得（A男/A女/B男/B女）
        //   メンバー未登録でも 0/0/0/0 を入れて落ちないようにする
        var mA = 0, fA = 0, mB = 0, fB = 0;
        allMembers.forEach(function (m) {
          if (!m) return;
          if (m.team === 'A') {
            if (m.gender === '女') fA++;
            else mA++; // 既定 '男' 扱い
          } else if (m.team === 'B') {
            if (m.gender === '女') fB++;
            else mB++;
          }
        });
        data.memberCounts = { mA: mA, fA: fA, mB: mB, fB: fB };
        renderConfig(data);
      } catch (err) {
        showError((err && err.message) || '読込エラー');
      }
    }

    function renderConfig(data) {
      if (!data || !data.ok) { showError(data && data.error || 'データ取得失敗'); return; }
      currentConfig = data;
      document.getElementById('main').removeAttribute('aria-busy');

      var cb = function (id, label, checked) {
        return '<label class="config-checkbox">' +
          '<input type="checkbox" id="' + id + '"' + (checked ? ' checked' : '') + '>' +
          '<span>' + escapeHtml(label) + '</span>' +
          '</label>';
      };

      document.getElementById('main').innerHTML =
        '<section class="config-section">' +
          '<h2>基本設定</h2>' +
          // spec/feature-mixedcount-ui-2026-05-23 §3:
          //   コート数 / 予定ラウンド数 が変わったら推奨値を再計算（oninput で即時更新）
          '<label class="config-row"><span>コート数</span>' +
            '<input type="number" inputmode="numeric" pattern="[0-9]*" min="1" max="20" id="cfg-court-count" value="' + (data.courtCount || 2) + '" oninput="updateMixRecommend()">' +
          '</label>' +
          '<label class="config-row"><span>チームA 名前</span>' +
            '<input type="text" id="cfg-team-a" value="' + escapeHtml(data.teamAName) + '" maxlength="30">' +
          '</label>' +
          '<label class="config-row"><span>チームB 名前</span>' +
            '<input type="text" id="cfg-team-b" value="' + escapeHtml(data.teamBName) + '" maxlength="30">' +
          '</label>' +
          '<label class="config-row"><span>予定ラウンド数（任意）</span>' +
            '<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="50" id="cfg-planned" value="' + (data.plannedRounds != null ? data.plannedRounds : '') + '" placeholder="空欄=自動" oninput="updateMixRecommend()">' +
          '</label>' +
        '</section>' +

        '<section class="config-section">' +
          '<h2>実施するカテゴリー</h2>' +
          cb('cfg-mens-doubles',   '男子ダブルス',     data.categories.mensDoubles) +
          cb('cfg-womens-doubles', '女子ダブルス',     data.categories.womensDoubles) +
          cb('cfg-mixed-doubles',  'ミックスダブルス', data.categories.mixedDoubles) +
          cb('cfg-mens-singles',   'シングルス(男)', data.categories.mensSingles) +
          cb('cfg-womens-singles', 'シングルス(女)', data.categories.womensSingles) +
        '</section>' +

        // 2026-05-26 オーナー指示「優先順位を UI で手動調整可能化」:
        //   各 PENALTY 重みを設定画面から直接編集できるセクション。
        //   hard 制約（コート空き禁止・'none' 除外・カテゴリ最低1試合）は UI 調整不可・固定。
        //   保存ボタンを押すと dbSaveConfig → IndexedDB に penaltyWeights として書き込まれ、
        //   次回以降のラウンド生成・プレビュー・推奨値計算でこの値が反映される。
        //   「デフォルトに戻す」ボタンで DEFAULT_PENALTY_WEIGHTS の値に一括復帰可能。
        //
        // 2026-05-26 オーナー差し戻し（hard 固定化）:
        //   「カテゴリ最低1試合 はマストなので最優先に常においておくこと（設定画面から非表示）」
        //   → 入力欄を削除。tennis-core.js の effectivePenalty で常に 1000000 を強制する。
        '<section class="config-section" id="cfg-algorithm-section">' +
          '<h2>アルゴリズム調整 (優先順位の重み)</h2>' +
          '<p class="hint" style="margin-bottom:10px;">各項目の数値が大きいほど優先されます。コート空き禁止・「ミックスなし」除外・カテゴリ最低1試合は固定 (変更不可)。</p>' +

      // gm-S11 (2026-05-24): ミックス試合数は設定画面から削除されたため

    // ─── spec/feature-mixedcount-ui-2026-05-23 §2: 推奨値計算（純関数）
    //   N: 予定ラウンド数（空欄なら 5 を仮定。オーナー指摘の体感値）
    //   courts: コート数
    //   counts: { mA, fA, mB, fB }（A男/A女/B男/B女）
    //   返り値: { value, totalSlots, maxPossible, courts, N, note }
    //   ロジック:
    //     - maxMixPerRound = min(mA, fA, mB, fB)  ※ A男×B女 / B男×A女 の両ペアが組める最大数
    //     - totalSlots = N * courts
    //     - maxPossible = min(maxMixPerRound * N, totalSlots)
    //     - 推奨値 = round(totalSlots * 0.5) を上限 maxPossible でクランプ
    //     - 男女混成ペアが組めない (maxMixPerRound === 0) → value=0
    function calculateRecommendedMix(counts, courts, N) {
      var mA = Number(counts && counts.mA) || 0;
      var fA = Number(counts && counts.fA) || 0;
      var mB = Number(counts && counts.mB) || 0;
      var fB = Number(counts && counts.fB) || 0;
      var c = Number(courts) > 0 ? Math.floor(Number(courts)) : 2;
      var n = Number(N) > 0 ? Math.floor(Number(N)) : 5;
      var maxMixPerRound = Math.min(mA, fA, mB, fB);
      var totalSlots = n * c;
      if (maxMixPerRound === 0) {
        return {
          value: 0,
          totalSlots: totalSlots,
          maxPossible: 0,
          courts: c,
          N: n,
          note: '男女混成ペアを組める人員が不足（A男/A女/B男/B女のいずれかが0人）',
        };
      }
      var maxPossible = Math.min(maxMixPerRound * n, totalSlots);
      var half = Math.round(totalSlots * 0.5);
      var recommended = Math.min(maxPossible, half);
      if (recommended < 0) recommended = 0;
      return {
        value: recommended,
        totalSlots: totalSlots,
        maxPossible: maxPossible,
        courts: c,
        N: n,
        note: '',
      };
    }

    // ─── spec/feature-mixedcount-ui-2026-05-23 §3:
    //   cfg-court-count / cfg-planned の oninput で呼ばれる
    //   currentConfig.memberCounts を使って推奨値を再計算 → #cfg-mix-recommend を書き換え
    function updateMixRecommend() {
      var elRec = document.getElementById('cfg-mix-recommend');
      if (!elRec) return; // 設定画面でない / 描画前
      var courts = 2, planned = 5;
      var elCourt = document.getElementById('cfg-court-count');
      var elPlanned = document.getElementById('cfg-planned');
      if (elCourt && elCourt.value !== '') courts = Number(elCourt.value) || 2;
      if (elPlanned && elPlanned.value !== '') planned = Number(elPlanned.value) || 5;
      var counts = (currentConfig && currentConfig.memberCounts) || { mA: 0, fA: 0, mB: 0, fB: 0 };
      var rec = calculateRecommendedMix(counts, courts, planned);
      var lines = [];
      // 3者判定 M-5: color はインラインで指定せず CSS クラス (.mix-recommend-box span) に委譲
      //              → ダークモードで自動的に切り替わる
      lines.push('推奨値: <strong>' + rec.value + ' 回</strong>');
      if (rec.note) {
        lines.push('<span style="font-size:12px;">（' + escapeHtml(rec.note) + '）</span>');
      } else {
        lines.push('<span style="font-size:12px;">（' + rec.N + 'ラウンド × コート' + rec.courts + ' = 全' + rec.totalSlots + '試合のうち約半分）</span>');
      }
      lines.push('<span style="font-size:11px;display:block;margin-top:4px;">物理上限: ' + rec.maxPossible + ' 回 / 全試合数: ' + rec.totalSlots + '</span>');
      // メンバー数の内訳（オーナーが「人数がわかると判断できる」と分かるように）
      lines.push('<span style="font-size:11px;display:block;">メンバー: A男' + counts.mA + '/A女' + counts.fA + '/B男' + counts.mB + '/B女' + counts.fB + '</span>');
      elRec.innerHTML = lines.join('<br>');
    }

    // ─── R1: JSON エクスポート（window.io.exportAll → Blob ダウンロード）
    async function exportAllJson() {
      var btn = document.getElementById('btn-export-json');
      if (btn) { btn.disabled = true; btn.textContent = '書き出し中...'; }
      try {
        var jsonStr = await window.io.exportAll();
        // ファイル名: tennis-export-YYYYMMDD-HHMM.json
        var now = new Date();
        var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
        var fname = 'tennis-export-' +
          now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + '-' +
          pad(now.getHours()) + pad(now.getMinutes()) + '.json';
        var blob = new Blob([jsonStr], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // メモリリーク回避のため少し待ってから revoke
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        if (btn) { btn.disabled = false; btn.textContent = '📤 全データJSONエクスポート'; }
        alert('エクスポート完了: ' + fname);
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = '📤 全データJSONエクスポート'; }
        alert('エクスポート失敗: ' + ((err && err.message) || String(err)));
      }
    }

    // ─── R1: JSON インポート（file input をプログラム的に開く）
    function triggerImportJson() {
      if (!confirm('既存データを全置換します。よろしいですか？\n\n念のため事前にエクスポートでバックアップを取ることを推奨します。')) return;
      var input = document.getElementById('input-import-json');
      if (input) {
        input.value = ''; // 同じファイル再選択時にも change が発火するようリセット
        input.click();
      }
    }

    // ─── R1: ファイル選択後に呼ばれる onchange ハンドラ
    async function handleImportJsonFile(event) {
      var input = event && event.target;
      var files = input && input.files;
      if (!files || files.length === 0) return;
      var file = files[0];
      var btn = document.getElementById('btn-import-json');
      if (btn) { btn.disabled = true; btn.textContent = '読み込み中...'; }
      try {
        // FileReader でテキストとして読む（file:// + IndexedDB 環境で安定）
        var text = await new Promise(function (resolve, reject) {
          var fr = new FileReader();
          fr.onload = function () { resolve(String(fr.result || '')); };
          fr.onerror = function () { reject(new Error('ファイル読み込みエラー')); };
          fr.readAsText(file, 'utf-8');
        });
        await window.io.importAll(text);
        if (btn) { btn.disabled = false; btn.textContent = '📥 JSONからインポート'; }
        alert('インポート完了。ラウンド一覧画面に移動します。');
        navigateTo('#view=rounds');
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = '📥 JSONからインポート'; }
        alert('インポート失敗: ' + ((err && err.message) || String(err)));
      }
    }

    function collectConfig() {
      // gm-S11 fix (2026-05-24): 要素削除に伴い null 安全化
      //   旧: document.getElementById(id).value → 要素なしで TypeError
      //   新: 要素なし → 空文字を返す（呼出元 v('cfg-mixed-count') 等で null 判定が効く）
      var v = function (id) { var el = document.getElementById(id); return el ? el.value : ''; };
      var c = function (id) { var el = document.getElementById(id); return el ? el.checked : false; };
      // 2026-05-26: アルゴリズム重み収集
      //   各 input から数値を読み、空欄/NaN は currentConfig.penaltyWeights のフォールバックを使う。
      //   currentConfig が無い（初回読込前など）場合は DEFAULT_PENALTY_WEIGHTS を使う。
      var curPW = (currentConfig && currentConfig.penaltyWeights) || DEFAULT_PENALTY_WEIGHTS;
      var readPW = function (id, key) {
        var raw = v(id);
        if (raw === '' || raw == null) return curPW[key];
        var n = Number(raw);
        return isNaN(n) ? curPW[key] : n;
      };
      // 「試合数均等」スライダ 1 つで MEMBER_GAP_WEIGHT と SKIP_MIN_PLAY を一括変更
      //   （同じ「試合数均等」優先カテゴリだから・spec の優先順位 5 位に対応）
      var memberGap = readPW('cfg-pen-member-gap', 'MEMBER_GAP_WEIGHT');
      // 「ミックス希望」スライダ 1 つで MIX_PREFER_BONUS と MIX_AVOID_PENALTY を一括変更
      //   （ともに same scale で more/less のおまけ補正に使う）
      var mixPref = readPW('cfg-pen-mix-pref', 'MIX_PREFER_BONUS');
      // 「対戦かぶり (累計ペア)」スライダ 1 つで SAME_OPPONENT_PAIR と RECENT_OPPONENT_PENALTY を一括変更
      //   （RECENT は累計ペアより僅かに重い同カテゴリ）
      var sameOppPair = readPW('cfg-pen-same-opp-pair', 'SAME_OPPONENT_PAIR');
      // 「対戦かぶり (累計個人)」スライダ 1 つで SAME_OPPONENT_INDIV と RECENT_OPPONENT_INDIV_PENALTY を一括変更
      var sameOppIndiv = readPW('cfg-pen-same-opp-indiv', 'SAME_OPPONENT_INDIV');
      return {
        courtCount:    Number(v('cfg-court-count')) || 2,
        teamAName:     v('cfg-team-a').trim(),
        teamBName:     v('cfg-team-b').trim(),
        plannedRounds: v('cfg-planned') === '' ? null : Number(v('cfg-planned')),
        categories: {
          mensDoubles:   c('cfg-mens-doubles'),
          womensDoubles: c('cfg-womens-doubles'),
          mixedDoubles:  c('cfg-mixed-doubles'),
          mensSingles:   c('cfg-mens-singles'),
          womensSingles: c('cfg-womens-singles'),
        },
        // gm-S11 (2026-05-24): mixedCount は設定画面から削除されたため
        //   collectConfig では既存の保存値を読まずに維持する (currentConfig.mixedCount フォールバック)。
        //   これにより既存テスト (setupDiv4x4(page, { mixedCount: 3 })) で IndexedDB に
        //   直接書かれた mixedCount は設定画面の保存操作後も保持される。
        //   生成画面の input (#gen-mixed-count) は generateOne 側で別途読まれる。
        mixedCount: (currentConfig && currentConfig.mixedCount != null) ? currentConfig.mixedCount : null,
        // 2026-05-26: アルゴリズム重み（UI で手動調整した値を含む）
        //   CATEGORY_ZERO_PENALTY は hard 固定（オーナー指示・UI 非表示）のため保存しない。
        //   tennis-core.js の effectivePenalty で常に PENALTY デフォルト値 (1000000) が強制される。
        penaltyWeights: {
          MEMBER_GAP_WEIGHT:             memberGap,
          SKIP_MIN_PLAY:                 memberGap,
          DUPLICATE_PAIR_PENALTY:        readPW('cfg-pen-duplicate-pair', 'DUPLICATE_PAIR_PENALTY'),
          SAME_PAIR:                     readPW('cfg-pen-same-pair', 'SAME_PAIR'),
          RECENT_PAIR_PENALTY:           readPW('cfg-pen-recent-pair', 'RECENT_PAIR_PENALTY'),
          SAME_OPPONENT_PAIR:            sameOppPair,
          RECENT_OPPONENT_PENALTY:       sameOppPair,
          SAME_OPPONENT_INDIV:           sameOppIndiv,
          RECENT_OPPONENT_INDIV_PENALTY: sameOppIndiv,
          CONSECUTIVE_SKIP_PENALTY:      readPW('cfg-pen-consec-skip', 'CONSECUTIVE_SKIP_PENALTY'),
          MIX_PREFER_BONUS:              mixPref,
          MIX_AVOID_PENALTY:             mixPref,
          LEVEL_DIFF:                    readPW('cfg-pen-level-diff', 'LEVEL_DIFF'),
        },
      };
    }

    // 2026-05-26 オーナー指示「優先順位を UI で手動調整可能化」:
    //   アルゴリズム調整セクションの各入力欄を DEFAULT_PENALTY_WEIGHTS の値に一括リセット。
    //   ※ リセットボタン押下時点では UI 入力欄のみ書き換える（IndexedDB には書かない）。
    //     保存ボタンを押して dbSaveConfig 経由で初めて IndexedDB に反映される（既存挙動と整合）。
    function resetAlgorithmDefaults() {
      var setVal = function (id, val) {
        var el = document.getElementById(id);
        if (el) el.value = String(val);
      };
      setVal('cfg-pen-member-gap',     DEFAULT_PENALTY_WEIGHTS.MEMBER_GAP_WEIGHT);
      // CATEGORY_ZERO_PENALTY は hard 固定（UI 非表示）のためリセット対象外
      setVal('cfg-pen-duplicate-pair', DEFAULT_PENALTY_WEIGHTS.DUPLICATE_PAIR_PENALTY);
      setVal('cfg-pen-same-pair',      DEFAULT_PENALTY_WEIGHTS.SAME_PAIR);
      setVal('cfg-pen-recent-pair',    DEFAULT_PENALTY_WEIGHTS.RECENT_PAIR_PENALTY);
      setVal('cfg-pen-same-opp-pair',  DEFAULT_PENALTY_WEIGHTS.SAME_OPPONENT_PAIR);
      setVal('cfg-pen-same-opp-indiv', DEFAULT_PENALTY_WEIGHTS.SAME_OPPONENT_INDIV);
      setVal('cfg-pen-consec-skip',    DEFAULT_PENALTY_WEIGHTS.CONSECUTIVE_SKIP_PENALTY);
      setVal('cfg-pen-mix-pref',       DEFAULT_PENALTY_WEIGHTS.MIX_PREFER_BONUS);
      setVal('cfg-pen-level-diff',     DEFAULT_PENALTY_WEIGHTS.LEVEL_DIFF);
    }

    async function saveConfig(force) {
      var config = collectConfig();
      // クライアントサイドバリデーション
      if (!config.courtCount || config.courtCount < 1 || config.courtCount > 20) {
        alert('コート数は 1〜20 で入力してください'); return;
      }
      if (!config.teamAName) { alert('チームA名を入力してください'); return; }
      if (!config.teamBName) { alert('チームB名を入力してください'); return; }
      var cats = config.categories;
      if (!cats.mensDoubles && !cats.womensDoubles && !cats.mixedDoubles && !cats.mensSingles && !cats.womensSingles) {
        alert('カテゴリーを最低1つ選択してください'); return;
      }

      var btn = document.getElementById('btn-save-config');
      btn.disabled = true; btn.textContent = '保存中...';
      try {
        var res = await dbSaveConfig(config, force ? 'true' : 'false');
        btn.disabled = false; btn.textContent = '保存';
        alert('設定を保存しました');
        if (res.turnedOff && res.turnedOff.length > 0) {
          console.log('OFFになったカテゴリー: ' + res.turnedOff.join(', '));
        }
      } catch (err) {
        btn.disabled = false; btn.textContent = '保存';
        var msg = (err && err.message) || String(err);
        if (!force && /履歴に該当カテゴリー/.test(msg)) {
          if (confirm('注意: ' + msg + '\n\n強制保存しますか？\n（過去履歴は残りますが、新規ラウンド生成では使われません）')) {
            saveConfig(true);
          }
        } else {
          alert('保存失敗: ' + msg);
        }
      }
    }

    // ─── 画面6: ラウンド生成 ────────────────────────────────
    // S8: 生成画面でラウンド数を指定できるようにする
    //   - 初期値: config.plannedRounds（≧1 の整数）/ 未設定なら 1

    async function loadGenerate() {

      try {
        var rounds = await dbGetRounds();

          ? Math.max.apply(null, rounds.map(function (r) { return r.round; })) + 1
          : 1);
        // S8: 設定の plannedRounds を初期値ソースとして取得（null / 0以下 / 非数値 はフォールバック 1）
        var cfg = await dbGetConfig();
        var initialN = 1;
        if (cfg && cfg.plannedRounds != null) {
          var nNum = Number(cfg.plannedRounds);

          }
        }

        document.getElementById('main').innerHTML =
          '<section class="generate-section">' +
            '<h2>次のラウンド番号: 第' + nextRound + 'ラウンド</h2>' +
            '<p class="hint">設定とメンバーは事前に確認してください</p>' +
          '</section>' +

          // S8: ラウンド数指定セクション
          // S8 fix (reviewer指摘): oninput="updateGenerateLabels()" でボタン文言を動的更新
          // gp-S9 (2026-05-24): oninput で updateGeneratePreview() も呼ぶ（予定試合数プレビュー動的更新）
          '<section class="generate-section">' +

          // gp-S9 (2026-05-24): 予定試合数プレビュー（カテゴリ別＋合計）
          //   - planOptimalConfiguration_(N, ctx, opts) を呼んで {a, b, c} を取得し表示

          // gp-S9 fix v3 (2026-05-24 オーナー実機「予定試合数でていない」対応):
          //   - h2 を style 14px → 通常サイズに戻し見落とし防止
          //   - ラベルを「予定試合数 (1R)」→「予定試合数（X ラウンド合計）」と説明的に

          // gm-S11 (2026-05-24 オーナー仕様変更): 生成画面に「ミックス試合数」セクションを新設
          //   - 推奨値ボックス: 男女数・希望から自動算出 (calculateGenMixRecommend)

          //   - oninput で updateGeneratePreview() を呼び、プレビューに即時反映
          //   - aria-live: 推奨値ボックスはスクリーンリーダ対応
          //
          // gm-S12 (2026-05-25 オーナー追加仕様): 男ダブ・女ダブも生成時に試合数指定可能に
          //   - ミックスと同じ UI パターン: 推奨値ボックス + input + 反映ボタン
          //   - 推奨値は planOptimalConfiguration_(N, ctx, {}) の {a, b, c} から
          //     a (男ダブ推奨) / b (女ダブ推奨) を取得
          //   - 空欄なら推奨値が使われる (generateOne 内で fixedMD/fixedFD=null として渡す)
          //   - 数値なら HARD 制約として絶対化する
          '<section class="generate-section" id="gen-md-section">' +
            '<h2>男子ダブルス試合数</h2>' +
            '<p class="hint" style="margin-bottom:10px;font-size:13px;">' +

              '<span style="font-size:12px;">※「実施するカテゴリー」で <strong>男子ダブルス</strong> がオフだと適用されません。</span>' +

            '<div class="hint mix-recommend-box" id="gen-md-recommend" role="status" aria-live="polite" aria-atomic="true">推奨値: 計算中...</div>' +
            '<label class="config-row"><span>男ダブ試合数</span>' +
              '<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99" id="gen-md-count" value="" placeholder="空欄=推奨値を使用" oninput="updateGeneratePreview()">' +
            '</label>' +
            '<button class="generate-btn" id="btn-apply-md-recommend" type="button" onclick="applyMDRecommend()" style="margin-top:8px;">推奨値を入力欄に反映</button>' +
          '</section>' +

          '<section class="generate-section" id="gen-fd-section">' +
            '<h2>女子ダブルス試合数</h2>' +
            '<p class="hint" style="margin-bottom:10px;font-size:13px;">' +
              'この回の女ダブ試合数を指定します。空欄なら推奨値を使います。<br>' +
              '<span style="font-size:12px;">※「実施するカテゴリー」で <strong>女子ダブルス</strong> がオフだと適用されません。</span>' +
            '</p>' +
            '<div class="hint mix-recommend-box" id="gen-fd-recommend" role="status" aria-live="polite" aria-atomic="true">推奨値: 計算中...</div>' +
            '<label class="config-row"><span>女ダブ試合数</span>' +
              '<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99" id="gen-fd-count" value="" placeholder="空欄=推奨値を使用" oninput="updateGeneratePreview()">' +
            '</label>' +
            '<button class="generate-btn" id="btn-apply-fd-recommend" type="button" onclick="applyFDRecommend()" style="margin-top:8px;">推奨値を入力欄に反映</button>' +
          '</section>' +

          '<section class="generate-section" id="gen-mix-section">' +
            '<h2>ミックス試合数</h2>' +
            '<p class="hint" style="margin-bottom:10px;font-size:13px;">' +
              'この回のミックス試合数を指定します。空欄なら推奨値（男女の数と希望から自動算出）を使います。<br>' +
              '<span style="font-size:12px;">※「実施するカテゴリー」で <strong>ミックスダブルス</strong> がオフだと適用されません。</span>' +

          '<section class="generate-section" id="gen-preview" aria-live="polite" aria-atomic="true">' +
            '<h2>予定試合数<span class="gp-rounds-label">（<span id="gp-rounds">' + initialN + '</span> ラウンド合計）</span></h2>' +
            '<div id="gp-empty-msg" class="hint" style="display:none;">' +
              'メンバーを追加すると予定試合数が表示されます' +
            '</div>' +
            '<div id="gp-numbers">' +
              '<div class="gp-row">' +
                '<span id="gp-md">男ダブ -試合</span>' +
                '<span aria-hidden="true">/</span>' +
                '<span id="gp-fd">女ダブ -試合</span>' +
                '<span aria-hidden="true">/</span>' +
                '<span id="gp-mix">ミックス -試合</span>' +
              '</div>' +

                '合計 <span id="gp-total">-</span> 試合' +

          '<div class="generate-actions">' +
            '<button class="generate-btn primary" id="btn-generate-auto" onclick="generateOne()">&#9654; 自動で生成</button>' +
            '<button class="generate-btn" id="btn-generate-custom" onclick="generateCustom()">&#9999; 空テンプレで作成</button>' +
          '</div>';
        // S8 fix (reviewer指摘): 初期描画直後に initialN ぶんを反映
        updateGenerateLabels();
        // gp-S9: 初期描画直後にプレビューも反映（async だが await しない＝描画ブロック回避）
        updateGeneratePreview();
        // gm-S11/S12 + 2026-05-25 推奨値合計バグ対応:
        //   3つの推奨値ボックスを統一計算で同時更新（plan.{a,b,c} ベース）
        updateAllGenRecommendations();
      } catch (err) {
        showError((err && err.message) || '読込エラー');
      }
    }

    // S8 fix (reviewer指摘・受入条件2): 入力欄の値に応じてボタンラベルを動的更新
    //   - N が 1〜50 の整数 → 「▶ 自動でNラウンド生成」「✎ 空テンプレでNラウンド作成」
    //   - 空欄 / 0以下 / 非数値 / 50超 / 小数 → 「▶ 自動で生成」「✎ 空テンプレで作成」（数字なしフォールバック）
    function updateGenerateLabels() {
      var elInput = document.getElementById('gen-count');
      var btnAuto = document.getElementById('btn-generate-auto');
      var btnCustom = document.getElementById('btn-generate-custom');
      if (!btnAuto || !btnCustom) return;
      var raw = elInput ? elInput.value : '';
      var n = NaN;
      if (raw !== '' && raw != null) n = Number(raw);
      var hasValidN = isFinite(n) && n >= 1 && n <= 50 && Math.floor(n) === n;
      // ▶ = &#9654; / ✎ = &#9999; を実体文字で固定（textContent に直接設定するため HTML エスケープ不要）
      var arrow = '▶'; // ▶
      var pencil = '✎'; // ✎
      if (hasValidN) {
        btnAuto.textContent = arrow + ' 自動で' + n + 'ラウンド生成';
        btnCustom.textContent = pencil + ' 空テンプレで' + n + 'ラウンド作成';
      } else {
        btnAuto.textContent = arrow + ' 自動で生成';
        btnCustom.textContent = pencil + ' 空テンプレで作成';
      }
    }

    // S8: 入力欄から N を取得して 1〜50 にクランプ。空欄や非数値は 1 として扱う
    function readGenerateCount() {
      var el = document.getElementById('gen-count');
      if (!el) return 1;
      var raw = el.value;
      if (raw === '' || raw == null) return 1;
      var n = Number(raw);
      if (!isFinite(n) || n < 1) return 0; // 0 を返して呼出元でアラート
      if (n > 50) return -1;                // -1 を返して呼出元でアラート
      return Math.floor(n);
    }

    // gp-S9 (2026-05-24): 予定試合数プレビューを再計算して DOM に反映
    //   - planOptimalConfiguration_(N, ctx, opts) を呼んで {a, b, c} を取得
    //   - mixedCount に有効な数値があれば fixedMix としてそれを渡す（dbGenerateRound 互換 ②パス）
    //   - 失敗時は数値部のみ "-" 表示にしてサイレントフォールバック（UI を壊さない）
    //   - 表示専用なので Round 数が不正でも 1 を仮置きして計算
    // gp-S9 fix v3 (2026-05-24 オーナー実機「予定試合数でていない」対応):
    //   - メンバー 0 人時は数値ブロック #gp-numbers を hide し #gp-empty-msg を表示
    //   - 実機デバッグ用に console.info で観測値をダンプ (devtools console で常に確認可能)
    //   - 要素未存在時もデバッグログを出して画面遷移漏れを検出
    async function updateGeneratePreview() {
      // 要素存在チェック（loadGenerate 以外の view ではスキップ）
      var elRounds = document.getElementById('gp-rounds');
      var elMD     = document.getElementById('gp-md');
      var elFD     = document.getElementById('gp-fd');
      var elMix    = document.getElementById('gp-mix');
      var elTotal  = document.getElementById('gp-total');
      var elEmpty   = document.getElementById('gp-empty-msg');
      var elNumbers = document.getElementById('gp-numbers');
      if (!elRounds || !elMD || !elFD || !elMix || !elTotal) {
        // gp-S9 fix v3: 実機デバッグ用に要素未存在を明示
        if (typeof console !== 'undefined' && console.info) {
          console.info('[gp-preview] DOM 要素未存在のためスキップ (loadGenerate 未経由の view)');
        }
        return;
      }
      try {
        var nRaw = readGenerateCount();
        // 空欄(0)・>50(-1) でも表示用には 1 にクランプ
        var n = (nRaw && nRaw >= 1) ? nRaw : 1;
        var cfg = await dbGetConfig();
        var all = await window.store.getAll('members');
        var normPref = function (mp) {
          return (mp === 'more' || mp === 'less' || mp === 'none') ? mp : null;
        };
        var teamA = all.filter(function (m) { return m && m.team === 'A'; }).map(function (m) {
          return {
            name: m.name,
            level: m.level || 0,
            // 2026-05-26: 性別バグ真因対策 — 未選択は '' のまま渡し、parseGender_ で null 化される
            gender: (m.gender === '女' || m.gender === '男') ? m.gender : '',
            mixedPreference: normPref(m.mixedPreference),
          };
        });
        var teamB = all.filter(function (m) { return m && m.team === 'B'; }).map(function (m) {
          return {
            name: m.name,
            level: m.level || 0,
            // 2026-05-26: 性別バグ真因対策 — 未選択は '' のまま渡し、parseGender_ で null 化される
            gender: (m.gender === '女' || m.gender === '男') ? m.gender : '',
            mixedPreference: normPref(m.mixedPreference),
          };
        });

        // gp-S9 fix v3 (2026-05-24): メンバー 0 人時の専用表示
        //   両チームともに 0 人 → 数値を計算しても「合計 0 試合」が並ぶだけでオーナー混乱する
        //   → 専用メッセージ「メンバーを追加すると予定試合数が表示されます」を出す
        if (teamA.length === 0 && teamB.length === 0) {
          elRounds.textContent = String(n);
          if (elEmpty)   elEmpty.style.display = 'block';
          if (elNumbers) elNumbers.style.display = 'none';
          if (typeof console !== 'undefined' && console.info) {
            console.info('[gp-preview] members=0 → empty メッセージ表示');
          }
          return;
        }
        // 数値ブロックに戻す（メンバー追加後の再描画用）
        if (elEmpty)   elEmpty.style.display = 'none';
        if (elNumbers) elNumbers.style.display = '';

        var ctx = {
          courts: cfg.courtCount,
          teamA: teamA,
          teamB: teamB,
          categories: cfg.categories,
          history: [],
          // 2026-05-26: UI プレビューも penaltyWeights 反映（実生成と完全一致）
          penaltyWeights: cfg.penaltyWeights || undefined,
        };
        // gp-S9 fix v4 (2026-05-24 reviewer 不均衡構成 UI vs 実生成乖離対応):
        //   実生成 generateOne は N>=2 / mixedCount=null の auto モードで:
        //     planN = planOptimalConfiguration_(n, ctxN, {})  ← N 全体プランを 1 回計算
        //   を実行し、decideRoundSlots_ で各 R の slot を確定。
        //   UIプレビューも同じく planOptimalConfiguration_(n, ctx, {}) を 1 回呼ぶことで
        //   N 全体最適化と完全に一致する。
        //
        //   旧 v2/v3: 1R×N 合計モデル (planOptimalConfiguration_(1) を N 回)
        //     → 不均衡 (A 男4女3 / B 男4女2 / N=10) で 1R 単位では「男ダブ1+ミックス1」が
        //       最適と判定され続け、N 全体最適 (男ダブ12/女ダブ6/ミックス2) と乖離。
        //     例: 1R×10 合計 = (10, 0, 10) vs N全体プラン = (12, 6, 2) 完全に違う
        //
        //   分岐モデル:
        //     - mixedCount HARD（数値）: distribution = planMixDistribution(M, n) で
        //       各 R の targetMix を均等配分 → 1R 単位 planOptimalConfiguration_(1, {fixedMix})
        //       を N 回呼んで合計。これは generateOne の「distribution パス」と同じ。
        //     - mixedCount=null / N>=2: planOptimalConfiguration_(n, ctx, {}) を 1 回呼ぶ。
        //       これは generateOne の「N 全体 slotPlan パス」と同じ。
        //     - N=1: planOptimalConfiguration_(1, ctx, {}) を 1 回呼ぶ。
        // gm-S11 (2026-05-24): mixedCount の優先順位は generateOne と同一
        //   ① 生成画面 input (#gen-mixed-count) → ② cfg.mixedCount → ③ auto
        // gm-S12 (2026-05-25): 男ダブ/女ダブも input から読む（generateOne と同じ優先順位）
        var elGenMixIn = document.getElementById('gen-mixed-count');
        var rawGenMixIn = elGenMixIn ? elGenMixIn.value : '';
        var hasInputMix = (rawGenMixIn !== '' && rawGenMixIn != null && !isNaN(Number(rawGenMixIn)));
        var hasCfgMix = (cfg.mixedCount != null && cfg.mixedCount !== ''
                          && !isNaN(Number(cfg.mixedCount)));
        var hasMixedCountValue = hasInputMix || hasCfgMix;
        var inputMDPrev = resolveGenMDCount();
        var inputFDPrev = resolveGenFDCount();
        var hasInputMDPrev = inputMDPrev !== null;
        var hasInputFDPrev = inputFDPrev !== null;
        var hasAnyDoublesInputPrev = hasInputMDPrev || hasInputFDPrev;
        var a = 0, b = 0, c = 0;
        if (hasMixedCountValue && !hasAnyDoublesInputPrev) {
          // mixedCount HARD 配分パス (generateOne distribution パスと同一・男女ダブ未指定時のみ)
          var M = hasInputMix ? Number(rawGenMixIn) : Number(cfg.mixedCount);
          if (M < 0) M = 0;
          if (M > 99) M = 99;
          var maxTotal = await calculateMaxPossibleMix(n);
          if (M > maxTotal) M = maxTotal;
          var distribution = planMixDistribution(M, n);
          for (var i = 0; i < n; i++) {
            var p1R = window.TennisCore.planOptimalConfiguration_(1, ctx, { fixedMix: distribution[i] });
            if (p1R) {
              a += (isFinite(p1R.a) ? p1R.a : 0);
              b += (isFinite(p1R.b) ? p1R.b : 0);
              c += (isFinite(p1R.c) ? p1R.c : 0);
            }
          }
        } else {
          // auto モード（または fixedMD/FD いずれか指定時）: N 全体プランを 1 回呼ぶ
          // gm-S12: 入力欄から fixedMix/fixedMD/fixedFD を opts に詰めて HARD 制約反映
          var optsPrev = {};
          if (hasInputMix) optsPrev.fixedMix = Number(rawGenMixIn);
          else if (hasCfgMix) optsPrev.fixedMix = Number(cfg.mixedCount);
          if (hasInputMDPrev) optsPrev.fixedMD = inputMDPrev;
          if (hasInputFDPrev) optsPrev.fixedFD = inputFDPrev;
          var planN = window.TennisCore.planOptimalConfiguration_(n, ctx, optsPrev);
          if (planN) {
            a = isFinite(planN.a) ? planN.a : 0;
            b = isFinite(planN.b) ? planN.b : 0;
            c = isFinite(planN.c) ? planN.c : 0;
          }
        }
        elRounds.textContent = String(n);
        elMD.textContent  = '男ダブ '   + a + '試合';
        elFD.textContent  = '女ダブ '   + b + '試合';
        elMix.textContent = 'ミックス ' + c + '試合';
        elTotal.textContent = String(a + b + c);
        // 2026-05-25 「予定試合数 0 バグ」対応:
        //   fixedMD/fixedFD/fixedMix 合計が totalSlots を超過しても
        //   planOptimalConfiguration_ 内 fallback で {a,b,c} を必ず返すようにした。
        //   ここでは合計超過/不足を視認できるよう、合計表示に警告サフィックスを付与する。
        var totalSlotsPrev = n * (Number(cfg.courtCount) || 2);
        if ((a + b + c) > totalSlotsPrev) {
          elTotal.textContent = String(a + b + c) + ' (※全 ' + totalSlotsPrev + ' 試合超過)';
        } else if ((a + b + c) < totalSlotsPrev) {
          elTotal.textContent = String(a + b + c) + ' (空き ' + (totalSlotsPrev - (a + b + c)) + ' 試合)';
        }
        // gp-S9 fix v3: 実機デバッグ用ログ（devtools console で値が見える）
        if (typeof console !== 'undefined' && console.info) {
          console.info('[gp-preview] N=' + n + ' / members A=' + teamA.length + ' B=' + teamB.length
                       + ' / MD=' + a + ' FD=' + b + ' Mix=' + c + ' / 合計=' + (a + b + c) + ' / totalSlots=' + totalSlotsPrev);
        }
      } catch (err) {
        // 表示専用なので失敗時は "-" で残す（コンソール出力のみ・UI を壊さない）
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('updateGeneratePreview failed:', err && err.message);
        }
        elRounds.textContent = String(readGenerateCount() || 1);
        elMD.textContent  = '男ダブ -試合';
        elFD.textContent  = '女ダブ -試合';
        elMix.textContent = 'ミックス -試合';
        elTotal.textContent = '-';
      }
    }

    // spec/feature-mixedcount-hard-2026-05-23.md §6-1:
    //   N ラウンド合計で M 試合を均等配分する計画を生成する。
    //   入力: M（mixedCount 目標）, N（ラウンド数）
    //   出力: [m1, m2, ..., mN] / sum(arr) = M / max-min <= 1（均等配分）
    //   端数: 前方 (M % N) ラウンドに +1 を寄せる（均等な間隔・推奨実装）
    function planMixDistribution(M, N) {
      if (!isFinite(M) || M < 0) M = 0;
      if (!isFinite(N) || N < 1) N = 1;
      M = Math.floor(M);
      N = Math.floor(N);
      var base = Math.floor(M / N);
      var rem  = M - base * N;
      var arr  = [];
      for (var i = 0; i < N; i++) {
        arr.push(base + (i < rem ? 1 : 0));
      }
      return arr;
    }

    // spec/feature-mixedcount-hard-2026-05-23.md §6-3:
    //   N ラウンドで物理的に組めるミックス試合数の上限を事前計算する。
    //   maxMix_eff_per_round = min(mActEff, fActEff, mBctEff, fBctEff, courtCount)
    //                          ※ 'none' を除いた男女有効プール × 1R 試合枠（コート数）
    //   maxTotal = maxMix_eff_per_round * N
    async function calculateMaxPossibleMix(numRounds) {
      var cfg = await dbGetConfig();
      var all = await window.store.getAll('members');
      var teamA = all.filter(function (m) { return m && m.team === 'A' && m.mixedPreference !== 'none'; });
      var teamB = all.filter(function (m) { return m && m.team === 'B' && m.mixedPreference !== 'none'; });
      var mA = teamA.filter(function (m) { return m.gender === '男'; }).length;
      var fA = teamA.filter(function (m) { return m.gender === '女'; }).length;
      var mB = teamB.filter(function (m) { return m.gender === '男'; }).length;
      var fB = teamB.filter(function (m) { return m.gender === '女'; }).length;
      var maxMixPerRound = Math.min(mA, fA, mB, fB);
      // 1R あたりコート数も上限になる（試合数 = コート数）
      var courtCount = Number(cfg.courtCount) || 2;
      maxMixPerRound = Math.min(maxMixPerRound, courtCount);
      return Math.max(0, maxMixPerRound * Number(numRounds));
    }

    // gm-S11 (2026-05-24 オーナー仕様変更):
    //   ミックス試合数の推奨値を、男女数 + 個別希望 (more/less/null/none) から自動算出。
    //   戻り値: { value, breakdown: { mA, fA, mB, fB, more, less, null, none }, maxMixTotal, totalSlots }
    //
    // 2026-05-25 「推奨値合計バグ」対応:
    //   value を planOptimalConfiguration_ の {a,b,c} の c に統一する。
    //   これにより MD/FD 推奨値 (plan.a, plan.b) と合計が必ず totalSlots に一致する。
    //   旧: ratio 0.3 ベースの独立計算で MD/FD 推奨値と合計超過する事象が発生。
    //   breakdown / maxMixTotal は表示用に維持。
    async function calculateGenMixRecommend(numRounds) {
      var cfg = await dbGetConfig();
      var all = await window.store.getAll('members');
      var courts = Number(cfg.courtCount) || 2;
      var n = Math.max(1, Math.floor(Number(numRounds) || 1));
      var totalSlots = n * courts;

      // 'none' 除外でカウント (maxMix の計算用)
      var teamAEff = all.filter(function (m) { return m && m.team === 'A' && m.mixedPreference !== 'none'; });
      var teamBEff = all.filter(function (m) { return m && m.team === 'B' && m.mixedPreference !== 'none'; });
      var mA = teamAEff.filter(function (m) { return m.gender === '男'; }).length;
      var fA = teamAEff.filter(function (m) { return m.gender === '女'; }).length;
      var mB = teamBEff.filter(function (m) { return m.gender === '男'; }).length;
      var fB = teamBEff.filter(function (m) { return m.gender === '女'; }).length;
      var maxMixPerRound = Math.min(mA, fA, mB, fB);
      var maxMixTotal = maxMixPerRound * n;

      // 希望調整: 'none' 除外メンバーから more/less/null をカウント
      var effMembers = all.filter(function (m) { return m && m.mixedPreference !== 'none'; });
      var moreCount = effMembers.filter(function (m) { return m.mixedPreference === 'more'; }).length;
      var lessCount = effMembers.filter(function (m) { return m.mixedPreference === 'less'; }).length;
      var nullCount = effMembers.filter(function (m) { return !m.mixedPreference; }).length;
      var noneCount = all.filter(function (m) { return m && m.mixedPreference === 'none'; }).length;

      // 統一推奨値 (planN.c) を採用
      var rec = await calculateAllGenRecommendations(n);
      var value = rec.mix;
      if (value < 0)             value = 0;
      if (value > maxMixTotal)   value = maxMixTotal;

      return {
        value: value,
        breakdown: { mA: mA, fA: fA, mB: mB, fB: fB, more: moreCount, less: lessCount, null: nullCount, none: noneCount },
        maxMixTotal: maxMixTotal,
        totalSlots: totalSlots,
        // 旧フィールド ratio は plan ベース計算に統一したため非該当だが互換のため残す
        ratio: totalSlots > 0 ? value / totalSlots : 0,
      };
    }

    // gm-S11: 生成画面の推奨値ボックス (#gen-mix-recommend) を更新
    async function updateGenMixRecommend() {
      var elRec = document.getElementById('gen-mix-recommend');

    // gm-S11: 「推奨値を入力欄に反映」ボタンのハンドラ
    // 2026-05-25 「推奨値合計バグ」対応:
    //   plan.c (= calculateAllGenRecommendations.mix) を直接反映する。
    //   旧 ratio 0.3 ベース (calculateGenMixRecommend.value) は plan.c と一致しない
    //   ケースがあり、MD/FD と合計が totalSlots を超過していた。

    // gm-S12 (2026-05-25 オーナー追加仕様): 男ダブ・女ダブ推奨値計算 + 入力欄反映
    // 2026-05-25 「推奨値合計バグ」対応:
    //   旧: MD/FD は planN.{a,b} / Mix は ratio 0.3 ベース (calculateGenMixRecommend) と
    //       バラバラのロジックで算出していた → 合計が totalSlots を超過 (例: 4+4+3=11 > 10)
    //   新: 3つすべて planOptimalConfiguration_(N, ctx, {}) の {a, b, c} から取得し
    //       「合計 == totalSlots」を物理的に保証する。
    //
    //   calculateAllGenRecommendations(numRounds):
    //     - planN を 1 回だけ計算
    //     - 戻り値: { md, fd, mix, totalSlots, sumOk, plan, ctxEmpty }
    //     - 各 update 関数 / apply 関数はこれを呼ぶだけにする
    async function calculateAllGenRecommendations(numRounds) {
      var cfg = await dbGetConfig();
      var all = await window.store.getAll('members');
      var courts = Number(cfg.courtCount) || 2;
      var n = Math.max(1, Math.floor(Number(numRounds) || 1));
      var totalSlots = n * courts;
      var normPref = function (mp) {
        return (mp === 'more' || mp === 'less' || mp === 'none') ? mp : null;
      };
      var teamA = all.filter(function (m) { return m && m.team === 'A'; }).map(function (m) {
        return {
          name: m.name,
          level: m.level || 0,
          // 2026-05-26: 性別バグ真因対策 — 未選択は '' のまま渡し、parseGender_ で null 化される
          gender: (m.gender === '女' || m.gender === '男') ? m.gender : '',
          mixedPreference: normPref(m.mixedPreference),
        };
      });
      var teamB = all.filter(function (m) { return m && m.team === 'B'; }).map(function (m) {
        return {
          name: m.name,
          level: m.level || 0,
          // 2026-05-26: 性別バグ真因対策 — 未選択は '' のまま渡し、parseGender_ で null 化される
          gender: (m.gender === '女' || m.gender === '男') ? m.gender : '',
          mixedPreference: normPref(m.mixedPreference),
        };
      });
      if (teamA.length === 0 && teamB.length === 0) {
        return {
          md: 0, fd: 0, mix: 0,
          totalSlots: totalSlots,
          sumOk: true, // 0+0+0 vs totalSlots=0 のみ true / それ以外は false 扱いで OK
          ctxEmpty: true,
          plan: null,
        };
      }
      var ctx = {
        courts: courts,
        teamA: teamA,
        teamB: teamB,
        categories: cfg.categories,
        history: [],
        // 2026-05-26: 推奨値計算も penaltyWeights 反映
        penaltyWeights: cfg.penaltyWeights || undefined,
      };
      var planN = window.TennisCore.planOptimalConfiguration_(n, ctx, {});
      if (!planN) {
        return {
          md: 0, fd: 0, mix: 0,
          totalSlots: totalSlots,
          sumOk: false,
          ctxEmpty: false,
          plan: null,
        };
      }
      var md  = isFinite(planN.a) ? planN.a : 0;
      var fd  = isFinite(planN.b) ? planN.b : 0;
      var mix = isFinite(planN.c) ? planN.c : 0;
      return {
        md: md, fd: fd, mix: mix,
        totalSlots: totalSlots,
        sumOk: (md + fd + mix) === totalSlots,
        ctxEmpty: false,
        plan: planN,
      };
    }

    // 旧 calculateGenDoublesRecommend 互換ラッパ（既存テスト・呼出経路を壊さない）
    async function calculateGenDoublesRecommend(numRounds) {
      var rec = await calculateAllGenRecommendations(numRounds);
      return { mdValue: rec.md, fdValue: rec.fd, mixValue: rec.mix };
    }

    // 2026-05-25 「推奨値合計バグ」対応:
    //   3つの推奨値ボックスを 1 回の plan 計算で同時に更新する親関数。
    //   plan.a + plan.b + plan.c = totalSlots を必ず保証するため、3つの update を
    //   個別に呼ぶ既存パスを残しつつ、本関数を loadGenerate / oninput で呼ぶ。
    async function updateAllGenRecommendations() {
      await Promise.all([
        updateGenMDRecommend(),
        updateGenFDRecommend(),
        updateGenMixRecommend(),
      ]);
    }

    // gm-S12: 男ダブ推奨値を input に反映
    async function applyMDRecommend() {

    // gm-S12: 男ダブ/女ダブ input の値を取得（空欄なら null = 未指定）
    //   - 空欄: null (推奨値・auto)
    //   - 数値: 0..99 にクランプ
    function resolveGenMDCount() {
      var el = document.getElementById('gen-md-count');
      var raw = el ? el.value : '';
      if (raw === '' || raw == null) return null;
      var v = Number(raw);
      if (!isFinite(v) || v < 0) return 0;
      if (v > 99) return 99;
      return Math.floor(v);
    }
    function resolveGenFDCount() {
      var el = document.getElementById('gen-fd-count');
      var raw = el ? el.value : '';
      if (raw === '' || raw == null) return null;
      var v = Number(raw);
      if (!isFinite(v) || v < 0) return 0;
      if (v > 99) return 99;
      return Math.floor(v);
    }

    // gm-S11: 生成画面 input から「この回のミックス試合数」を取得
    //   空欄なら推奨値を返す。数値が入っていればそれを 0..99 にクランプ。
    //   返り値: { value: number, fromInput: boolean }
    async function resolveGenMixCount(numRounds) {
      var el = document.getElementById('gen-mixed-count');
      var raw = el ? el.value : '';
      if (raw === '' || raw == null) {
        var rec = await calculateGenMixRecommend(numRounds);
        return { value: rec.value, fromInput: false };
      }
      var v = Number(raw);
      if (!isFinite(v) || v < 0) v = 0;
      if (v > 99) v = 99;
      return { value: Math.floor(v), fromInput: true };
    }

    // S8 + spec/feature-mixedcount-hard-2026-05-23.md:
    //   N ラウンド連続生成 + mixedCount HARD 配分計画
    //   ① 物理上限を事前計算し M > maxTotal なら confirm（OK=縮小実行 / Cancel=中止）
    //   ② planMixDistribution(M, N) で各ラウンドの targetMix を均等配分
    //   ③ ループ内で dbGenerateRound(targetMix) を呼ぶ
    async function generateOne() {
      var n = readGenerateCount();
      if (n === 0) { alert('ラウンド数は 1 以上を指定してください'); return; }
      if (n === -1) { alert('一度に生成できるのは 50 ラウンドまでです'); return; }
      if (!confirm('自動で次の ' + n + ' ラウンドを生成しますか？')) return;

      // gm-S11 (2026-05-24 オーナー仕様変更): mixedCount の優先順位
      //   ① 生成画面 input (#gen-mixed-count) が数値 → 最優先（オーナー仕様: 都度入力）
      //   ② cfg.mixedCount が数値 → 後方互換 (既存テスト経路)
      //   ③ ①②とも未指定 → auto（slotPlan パスへ）
      // ※ 生成画面 input 空欄でも resolveGenMixCount は推奨値を返すため
      //    「実質 ① を常に有効」にすると後方互換 ② が永続的に死ぬ。
      //    既存テストとの整合のため、明示的に input が空欄なら ② を試み、
      //    それも null なら推奨値を採用しない（auto=null distribution）形にする。
      //
      // gm-S12 (2026-05-25 オーナー追加仕様):
      //   男ダブ・女ダブも生成時に試合数指定可能（fixedMD/fixedFD opts）。
      //   #gen-md-count / #gen-fd-count が数値なら HARD 制約として絶対化、
      //   空欄なら従来通り auto（planOptimalConfiguration_ で自動算出）。
      //   3つの input が同時に空欄 or 数値混在の場合も対応：
      //     - 生成画面の N 全体プランを planOptimalConfiguration_(n, ctx, {fixedMix, fixedMD, fixedFD}) で算出
      //     - 各 input 空欄なら fixedXX=null として core に渡す（=auto）
      //     - 数値なら fixedXX=数値 として HARD 制約に
      //   distribution パス（mixedCount HARD のみ）は後方互換テスト用に残す。
      var cfg = await dbGetConfig();
      var elGenMix = document.getElementById('gen-mixed-count');
      var rawGenMix = elGenMix ? elGenMix.value : '';
      var hasInputMix = (rawGenMix !== '' && rawGenMix != null && !isNaN(Number(rawGenMix)));
      var hasCfgMix = (cfg.mixedCount != null && cfg.mixedCount !== ''
                        && !isNaN(Number(cfg.mixedCount)));
      var hasMixedCount = hasInputMix || hasCfgMix;

      // gm-S12: 男ダブ・女ダブ input の値（null = 未指定 / 数値 = HARD）
      var inputMD = resolveGenMDCount();
      var inputFD = resolveGenFDCount();
      var hasInputMD = inputMD !== null;
      var hasInputFD = inputFD !== null;
      var hasAnyDoublesInput = hasInputMD || hasInputFD;

      var distribution = null; // null = 配分計画なし（既存 auto パスに委ねる）
      // gm-S12: 男ダブ・女ダブ入力がない時に限り、旧 distribution パスを使う
      //   （ミックスのみ指定の場合は後方互換テスト経路を維持）
      if (hasMixedCount && !hasAnyDoublesInput) {
        var M;
        if (hasInputMix) {
          M = Number(rawGenMix);
          if (M < 0) M = 0;
          if (M > 99) M = 99;
        } else {
          M = Number(cfg.mixedCount);
        }
        var maxTotal = await calculateMaxPossibleMix(n);
        if (M > maxTotal) {
          // 物理上限超過: confirm で縮小実行 / 中止
          var ok = confirm(
            '物理的にミックス試合を ' + M + ' 回組めません。最大 ' + maxTotal + ' 回まで組めます。\n' +
            'OK = ' + maxTotal + ' 回で生成 / キャンセル = 中止'
          );
          if (!ok) return;
          M = maxTotal;
        }
        distribution = planMixDistribution(M, n);
      }

      // 2026-05-24: カテゴリ最低1試合 hard 保証対応
      //   mixedCount=null（auto）かつ N >= 2 のとき、N ラウンド全体プラン
      //   (planOptimalConfiguration_) を 1 回算出し、decideRoundSlots_ で
      //   各 R の slot 全体（MD/FD/Mix）を算出して dbGenerateRound に渡す。
      //   これにより 1R 単位の plan で「ミックスのみ全枠」になっていた問題を解消。
      //
      // gm-S12: 男ダブ・女ダブ入力がある場合（hasAnyDoublesInput）も slotPlan パスを使い
      //   planOptimalConfiguration_(n, ctxN, {fixedMix, fixedMD, fixedFD}) で N 全体プランを算出する。
      //   3つの fixedXX のいずれかが数値なら HARD 制約、null なら auto。
      var slotPlan = null; // [{ MD, FD, Mix }] 各 R の slot
      var shouldUseSlotPlan = (!hasMixedCount || hasAnyDoublesInput) && n >= 1;
      if (shouldUseSlotPlan) {
        try {
          var allMembers = await window.store.getAll('members');
          var teamAAll = allMembers.filter(function (m) { return m && m.team === 'A'; });
          var teamBAll = allMembers.filter(function (m) { return m && m.team === 'B'; });
          var ctxN = {
            courts: cfg.courtCount || 1,
            teamAName: cfg.teamAName || 'チームA',
            teamBName: cfg.teamBName || 'チームB',
            teamA: teamAAll,
            teamB: teamBAll,
            categories: cfg.categories || {
              mensDoubles: true, womensDoubles: true, mixedDoubles: true,
              mensSingles: false, womensSingles: false,
            },
            history: [],
            // 2026-05-26: アルゴリズム調整 UI 対応・N 全体プランも penaltyWeights を反映
            penaltyWeights: cfg.penaltyWeights || undefined,
          };
          // gm-S12: fixedMix/fixedMD/fixedFD を opts に詰める
          //   - 入力欄が空欄なら null（auto）
          //   - 数値なら HARD 制約
          var planOpts = {};
          if (hasInputMix) planOpts.fixedMix = Number(rawGenMix);
          else if (hasCfgMix) planOpts.fixedMix = Number(cfg.mixedCount);
          if (hasInputMD) planOpts.fixedMD = inputMD;
          if (hasInputFD) planOpts.fixedFD = inputFD;
          var planN = window.TennisCore.planOptimalConfiguration_(n, ctxN, planOpts);
          if (planN) {
            slotPlan = [];
            var cumA = { MD: 0, FD: 0, Mix: 0 };
            for (var rr = 1; rr <= n; rr++) {
              var slotR = window.TennisCore.decideRoundSlots_(
                planN, cumA, rr, n, ctxN.courts, ctxN
              );
              slotPlan.push(slotR);
              cumA.MD += slotR.MD;
              cumA.FD += slotR.FD;
              cumA.Mix += slotR.Mix;
            }
          }
        } catch (e) {
          slotPlan = null;
        }
      }

      var buttons = document.querySelectorAll('.generate-btn');
      buttons.forEach(function (b) { b.disabled = true; });
      var success = 0;
      var firstRound = null;
      var lastRound = null;
      var lastRoundWithMatches = null; // 2026-05-25 gm-S12: matchCount>0 の最終ラウンド (navigate 先)
      var totalMatches = 0;
      for (var i = 0; i < n; i++) {
        try {
          // 配分計画があれば各ラウンドの targetMix を渡す。なければ undefined（既存パス）。
          //   優先順位:
          //     1) distribution (mixedCount HARD 配分・数値の Mix 試合数)
          //     2) slotPlan (N全体 plan 配分・{ MD, FD, Mix } オブジェクト)
          //     3) undefined (従来の auto パス)
          var tm;
          if (distribution != null) {
            tm = distribution[i];
          } else if (slotPlan != null && slotPlan[i]) {
            tm = slotPlan[i];
          } else {
            tm = undefined;
          }
          var res = await dbGenerateRound(tm);
          success++;
          if (firstRound == null) firstRound = res.round;
          lastRound = res.round;
          // 2026-05-25 改訂: matchCount > 0 のラウンドだけを「最後の試合ありラウンド」として記録
          //   bucket gap=1.0 hard 除外で plan の合計試合数 < totalSlots になる構成では
          //   後段の R で matches=[] (空 record) になり得る。一覧表示は問題ないが、
          //   ラウンド詳細画面 (.match-card セレクタが出る画面) へ遷移するには
          //   matches > 0 のラウンド指定が必要。
          if ((res.matchCount || 0) > 0) lastRoundWithMatches = res.round;
          totalMatches += res.matchCount || 0;
        } catch (err) {
          buttons.forEach(function (b) { b.disabled = false; });
          var msg = (err && err.message) || String(err);
          alert(n + '回中 ' + success + ' ラウンド成功、' + (i + 1) + ' 回目で失敗: ' + msg);
          // (M-1) ラウンドは DB に残したまま一覧へ遷移
          navigateTo('#view=rounds');
          return;
        }
      }
      buttons.forEach(function (b) { b.disabled = false; });
      if (success === 1) {
        alert('第' + lastRound + 'ラウンドを生成しました（' + totalMatches + '試合）');
      } else {
        alert(success + ' ラウンドを生成しました（第' + firstRound + '〜第' + lastRound + 'ラウンド・合計' + totalMatches + '試合）');
      }
      // 全成功時は最後の「試合あり」ラウンド詳細へ遷移
      //   matchCount > 0 のラウンドが 1 つもなければ一覧へフォールバック
      var navigateRound = lastRoundWithMatches != null ? lastRoundWithMatches : null;
      if (navigateRound != null) {
        navigateTo('#view=round&round=' + navigateRound);
      } else {
        navigateTo('#view=rounds');
      }
    }

    // S8: 空テンプレ N ラウンド連続作成
    async function generateCustom() {
      var n = readGenerateCount();
      if (n === 0) { alert('ラウンド数は 1 以上を指定してください'); return; }
      if (n === -1) { alert('一度に生成できるのは 50 ラウンドまでです'); return; }
      if (!confirm('空テンプレで ' + n + ' ラウンド作成しますか？\n\n手動で選手名を入力する用です。')) return;
      var buttons = document.querySelectorAll('.generate-btn');
      buttons.forEach(function (b) { b.disabled = true; });
      var success = 0;
      var firstRound = null;
      var lastRound = null;
      for (var i = 0; i < n; i++) {
        try {
          var res = await dbGenerateRoundCustom();
          success++;
          if (firstRound == null) firstRound = res.round;
          lastRound = res.round;
        } catch (err) {
          buttons.forEach(function (b) { b.disabled = false; });
          var msg = (err && err.message) || String(err);
          alert(n + '回中 ' + success + ' ラウンド成功、' + (i + 1) + ' 回目で失敗: ' + msg);
          navigateTo('#view=rounds');
          return;
        }
      }
      buttons.forEach(function (b) { b.disabled = false; });
      if (success === 1) {
        alert('第' + lastRound + 'ラウンド（空テンプレ）を作成しました');
      } else {
        alert(success + ' ラウンドの空テンプレを作成しました（第' + firstRound + '〜第' + lastRound + 'ラウンド）');
      }
      navigateTo('#view=round&round=' + lastRound);
    }

    // ─── タブバーのアクティブ状態 ───────────────────────────
    function setActiveTab() {
      var bar = document.getElementById('footer-tab-bar');
      if (!bar) return;
      var tabKey = (VIEW === 'round' || VIEW === 'home') ? 'rounds' : VIEW;
      var items = bar.querySelectorAll('.tab-item');
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var isActive = item.getAttribute('data-tab') === tabKey;
        item.classList.toggle('active', isActive);
        if (isActive) item.setAttribute('aria-current', 'page');
        else item.removeAttribute('aria-current');
      }
    }

    // ============================================================
    // 初期化: store.open() → 初回 refresh
    // ============================================================
    (async function init() {
      try {
        await window.store.open();
        refresh();
      } catch (err) {
        showError('IndexedDB の初期化に失敗しました: ' + ((err && err.message) || String(err)));
      }
    })();

    // ============================================================
    // ADR-001 Phase 3 (PWA化) 2026-05-26: Service Worker 登録
    // ------------------------------------------------------------
    // 仕様:
    //   - http(s):// 配信時のみ動作（仕様上 file:// では Service Worker は動かない）
    //   - file:// で起動された場合は console.warn だけ吐いて続行（既存ダブルクリック起動を壊さない）
    //   - 登録失敗（HTTPS 未配信・SW JS 取得失敗 等）も console.warn のみ・本処理は止めない
    //   - スコープは './'（このフォルダ配下を全てキャッシュ対象）
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // file:// では SW 登録自体がエラーになる仕様。事前検出して console.warn 化。
        if (window.location.protocol === 'file:') {
          console.warn('[PWA] Service Worker は file:// では動作しません（http(s):// 配信時のみ）');
          return;
        }
        navigator.serviceWorker.register('./sw.js').then(function (reg) {
          // 登録成功時は scope だけ吐く（更新検知は Phase 4 以降で実装）
          console.log('[PWA] Service Worker registered:', reg.scope);
        }).catch(function (err) {
          console.warn('[PWA] Service Worker registration failed:', err && err.message ? err.message : err);
        });
      });
    }
  </script>
</body>
